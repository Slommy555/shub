<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Slommy HQ" />

    <title>Slommy HQ</title>
    <script>
      // Apply theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('theme'); // 'light' | 'dark' | 'system'
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((stored === 'system' || !stored) && prefersDark);
          if (dark) {
            document.documentElement.classList.add('dark');
          }
          // Apply cached custom colors too, so a custom-themed user doesn't flash
          // the default palette before useAppearance's effect runs. Mirrors the
          // CSS-var names set in src/hooks/useAppearance.ts.
          var appearance = JSON.parse(localStorage.getItem('appearance') || 'null');
          if (appearance && appearance.enabled && appearance.colors) {
            var c = appearance.colors;
            var root = document.documentElement;
            root.setAttribute('data-theme-custom', 'on');
            root.style.setProperty('--c-bg', c.bg);
            root.style.setProperty('--c-surface', c.surface);
            root.style.setProperty('--c-text', c.text);
            root.style.setProperty('--c-muted', c.muted);
            root.style.setProperty('--c-border', c.border);
            root.style.setProperty('--c-accent', c.accent);
            root.style.setProperty('--c-accent-text', c.accentText);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
