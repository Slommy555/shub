
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{padding:1.5rem 1rem;max-width:640px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:14px;color:var(--color-text-secondary);margin-top:2px}
.add-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1.25rem}
.row{display:flex;gap:8px;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.add-section input[type=text]{flex:1;font-size:15px}
.add-section select{font-size:13px;width:auto}
.add-section button.add-btn{background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);padding:0 16px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;height:36px}
.add-section button.add-btn:hover{opacity:0.85}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:13px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.tasks{display:flex;flex-direction:column;gap:6px}
.task-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:0.75rem 1rem;display:flex;align-items:flex-start;gap:10px;transition:opacity 0.2s}
.task-item.done{opacity:0.5}
.task-item.done .task-text{text-decoration:line-through}
.task-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0}
.task-check{width:18px;height:18px;border-radius:50%;border:0.5px solid var(--color-border-primary);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.task-check.checked{background:var(--color-text-primary);border-color:transparent}
.task-check.checked::after{content:'';width:5px;height:9px;border:2px solid var(--color-background-primary);border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px}
.task-body{flex:1;min-width:0}
.task-text{font-size:15px;color:var(--color-text-primary);line-height:1.4;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-work{background:#E6F1FB;color:#0C447C}
.tag-personal{background:#EEEDFE;color:#3C3489}
.tag-school{background:#EAF3DE;color:#27500A}
.tag-health{background:#E1F5EE;color:#085041}
.tag-other{background:#F1EFE8;color:#444441}
.prio{font-size:11px;font-weight:500}
.prio-high{color:#A32D2D}
.prio-med{color:#854F0B}
.prio-low{color:#0F6E56}
.task-date{font-size:11px;color:var(--color-text-tertiary)}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-tertiary);padding:2px;border-radius:4px;font-size:16px;line-height:1;display:flex;align-items:center}
.icon-btn:hover{color:var(--color-text-primary)}
.empty{text-align:center;padding:3rem 1rem;color:var(--color-text-tertiary);font-size:14px}
.count{font-size:13px;color:var(--color-text-secondary);margin-bottom:0.75rem}
@media(max-width:480px){.row{flex-wrap:wrap}.add-section select{flex:1}}
</style>

<div class="app">
  <h2 class="sr-only">Personal to-do list app</h2>
  <div class="header">
    <h1><i class="ti ti-checklist" aria-hidden="true"></i> My Tasks</h1>
    <p id="date-display"></p>
  </div>

  <div class="add-section">
    <div class="row">
      <input type="text" id="task-input" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTask()"><i class="ti ti-plus" aria-hidden="true"></i> Add</button>
    </div>
    <div class="row">
      <select id="cat-select">
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="school">School</option>
        <option value="health">Health</option>
        <option value="other">Other</option>
      </select>
      <select id="prio-select">
        <option value="high">High priority</option>
        <option value="med" selected>Medium priority</option>
        <option value="low">Low priority</option>
      </select>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">Done</button>
    <button class="filter-btn" data-filter="high" onclick="setFilter('high',this)">High priority</button>
    <button class="filter-btn" data-filter="work" onclick="setFilter('work',this)">Work</button>
    <button class="filter-btn" data-filter="school" onclick="setFilter('school',this)">School</button>
    <button class="filter-btn" data-filter="health" onclick="setFilter('health',this)">Health</button>
  </div>

  <div class="count" id="task-count"></div>
  <div class="tasks" id="task-list"></div>
</div>

<script>
let tasks = [];
let filter = 'all';

const STORAGE_KEY = 'my_tasks_v1';

async function load() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) tasks = JSON.parse(r.value);
  } catch(e) { tasks = []; }
  render();
}

async function save() {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(tasks)); } catch(e){}
}

document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

document.getElementById('task-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp.value.trim();
  if (!text) return;
  tasks.unshift({
    id: Date.now(),
    text,
    cat: document.getElementById('cat-select').value,
    prio: document.getElementById('prio-select').value,
    done: false,
    created: new Date().toISOString()
  });
  inp.value = '';
  save();
  render();
}

function toggle(id) {
  const t = tasks.find(t=>t.id===id);
  if(t) { t.done = !t.done; save(); render(); }
}

function remove(id) {
  tasks = tasks.filter(t=>t.id!==id);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filtered() {
  return tasks.filter(t => {
    if(filter==='active') return !t.done;
    if(filter==='done') return t.done;
    if(filter==='high') return t.prio==='high' && !t.done;
    if(['work','school','health','personal','other'].includes(filter)) return t.cat===filter;
    return true;
  });
}

const prioLabel = {high:'High',med:'Med',low:'Low'};
const catLabels = {work:'Work',personal:'Personal',school:'School',health:'Health',other:'Other'};

function render() {
  const list = filtered();
  const el = document.getElementById('task-list');
  const count = document.getElementById('task-count');
  const active = tasks.filter(t=>!t.done).length;
  count.textContent = `${active} task${active!==1?'s':''} remaining`;

  if(!list.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-mood-happy" style="font-size:32px;display:block;margin-bottom:8px" aria-hidden="true"></i>${tasks.length?'No tasks match this filter':'Add your first task above'}</div>`;
    return;
  }

  el.innerHTML = list.map(t => {
    const d = new Date(t.created).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="task-item${t.done?' done':''}">
      <div class="task-left">
        <div class="task-check${t.done?' checked':''}" onclick="toggle(${t.id})" role="checkbox" aria-checked="${t.done}" tabindex="0"></div>
        <div class="task-body">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-meta">
            <span class="tag tag-${t.cat}">${catLabels[t.cat]}</span>
            <span class="prio prio-${t.prio}">${prioLabel[t.prio]}</span>
            <span class="task-date">${d}</span>
          </div>
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="remove(${t.id})" aria-label="Delete task"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
